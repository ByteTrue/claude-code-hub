name: Claude Unified Documentation

on:
  push:
    tags:
      - "v*-fork.*"

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Fork release tag name (e.g., v0.6.6-fork.1)"
        required: true
        type: string

concurrency:
  group: unified-docs-${{ github.ref_name || github.event.inputs.tag_name }}
  cancel-in-progress: true

jobs:
  unified-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: release
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || secrets.GH_PAT }}

      - name: Determine release tag
        id: release_info
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-fork\.[0-9]+$' | grep -v "^$TAG$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -n 1)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Run Claude Code for Unified Docs Update
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN || secrets.GH_PAT }}
          prompt: |
            你正在为 fork release `${{ steps.release_info.outputs.tag }}` 更新文档。

            规则：
            - 只更新 CHANGELOG.md 和 GitHub Release Notes
            - 文档提交必须回写到 release 分支
            - 只处理 fork tag（格式 `vX.Y.Z-fork.N`）
            - main 是 upstream 同步分支，绝不回写 main
          claude_args: |
            --model claude-opus-4-6
            --max-turns 999
            --allowedTools Read,Write,Edit,Bash(*)
          use_commit_signing: false
