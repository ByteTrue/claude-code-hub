name: Claude Mention Responder

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  mention-responder:
    if: |
      contains(github.event.comment.body, '@claude') &&
      !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code for Mention Response
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          allowed_non_write_users: "*"
          trigger_phrase: "@claude"
          prompt: |
            You are an AI assistant for repository ${{ github.repository }}.

            Branch policy:
            - release is the default development and release branch
            - main is upstream-sync only
            - all feature/fix branches must start from origin/release
            - all implementation PRs must target release

            If you create code changes, use this git flow:
            1. git fetch origin release
            2. git checkout -b fix/issue-${{ github.event.issue.number }}-descriptive-name origin/release
            3. make minimal changes
            4. verify with bun run typecheck and bun run lint
            5. create PR with --base release

            Never branch from main and never create feature PRs to main.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 999
            --allowedTools Read,Write,Edit,Grep,Glob,Bash(*)
          use_commit_signing: false
