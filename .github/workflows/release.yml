name: Fork Release Pipeline

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force a fork release even if VERSION did not change"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.pusher.name != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine upstream base version
        id: version
        env:
          FORCE_RELEASE: ${{ github.event.inputs.force_release || 'false' }}
        run: |
          BASE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ -z "$BASE_VERSION" ]; then
            echo "VERSION file is empty"
            exit 1
          fi

          LAST_FORK_TAG=$(git tag --list "v${BASE_VERSION}-fork.*" --sort=-version:refname | head -n 1)
          if [ -n "$LAST_FORK_TAG" ]; then
            LAST_FORK_NUMBER=$(echo "$LAST_FORK_TAG" | sed -E 's/^.*-fork\.([0-9]+)$/\1/')
            NEXT_FORK_NUMBER=$((LAST_FORK_NUMBER + 1))
          else
            NEXT_FORK_NUMBER=1
          fi

          NEW_TAG="v${BASE_VERSION}-fork.${NEXT_FORK_NUMBER}"
          NEW_VERSION="${BASE_VERSION}-fork.${NEXT_FORK_NUMBER}"

          PREV_VERSION=$(git show HEAD~1:VERSION 2>/dev/null | tr -d '[:space:]' || true)
          if [ "$FORCE_RELEASE" = "true" ] || [ "$BASE_VERSION" != "$PREV_VERSION" ]; then
            SHOULD_RELEASE=true
          else
            SHOULD_RELEASE=false
          fi

          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

      - name: Stop when release is not needed
        if: steps.version.outputs.should_release != 'true'
        run: |
          echo "VERSION unchanged and force_release=false, skipping fork release"
          exit 0

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Fork release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Prepare image names
        id: image_names
        if: steps.version.outputs.should_release == 'true'
        run: |
          GHCR_IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/claude-code-hub" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Fork Release ${{ steps.version.outputs.new_version }}
          body: |
            ## Base upstream version

            - Upstream base: `v${{ steps.version.outputs.base_version }}`
            - Fork release: `${{ steps.version.outputs.new_tag }}`
            - Release branch: `release`

            ## Docker

            ```bash
            docker pull ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.version.outputs.new_tag }}
            docker pull ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.version.outputs.new_version }}
            docker pull ${{ steps.image_names.outputs.ghcr_image }}:latest
            ```
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Cleanup old fork tags and releases
        if: steps.version.outputs.should_release == 'true'
        env:
          TAGS_TO_KEEP: 20
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALL_TAGS=$(git tag --list 'v*-fork.*' --sort=version:refname)
          TOTAL_COUNT=$(echo "$ALL_TAGS" | sed '/^$/d' | wc -l | tr -d ' ')

          if [ "$TOTAL_COUNT" -le "$TAGS_TO_KEEP" ]; then
            echo "No old fork tags to clean up"
            exit 0
          fi

          DELETE_COUNT=$((TOTAL_COUNT - TAGS_TO_KEEP))
          TAGS_TO_DELETE=$(echo "$ALL_TAGS" | head -n "$DELETE_COUNT")

          for tag in $TAGS_TO_DELETE; do
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release delete "$tag" --yes --cleanup-tag || true
            else
              git push origin --delete "$tag" || true
            fi
          done

      - name: Set up QEMU
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.version.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.new_version }}
          tags: |
            ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.version.outputs.new_tag }}
            ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.version.outputs.new_version }}
            ${{ steps.image_names.outputs.ghcr_image }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
