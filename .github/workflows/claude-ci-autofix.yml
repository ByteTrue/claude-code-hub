name: Claude CI Auto-Fix

on:
  workflow_run:
    workflows: ["PR Build Check", "Release and Preview Branch CI/CD", "Fork Release Pipeline", "🧪 Test Suite"]
    types: [completed]

  workflow_dispatch:
    inputs:
      task_type:
        description: "Task type (ci-fix only)"
        required: true
        default: "ci-fix"
        type: choice
        options:
          - ci-fix

jobs:
  auto-fix:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       !startsWith(github.event.workflow_run.head_branch, 'claude-fix-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_type == 'ci-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');
            const pullRequests = ${{ toJSON(github.event.workflow_run.pull_requests) }};
            const hasPR = pullRequests && pullRequests.length > 0;

            return {
              runUrl: run.data.html_url,
              workflowName: run.data.name,
              failedJobs: failedJobs.map(j => j.name),
              hasPR: hasPR,
              prNumber: hasPR ? pullRequests[0].number : null,
              headBranch: '${{ github.event.workflow_run.head_branch }}'
            };

      - name: Run Claude Code for Auto-Fix
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN || secrets.GH_PAT }}
          prompt: |
            You are a CI failure auto-fixer for repository ${{ github.repository }}.

            Branch policy:
            - release is the default development branch
            - main is upstream-sync only
            - never create feature work from main

            Failed workflow: ${{ fromJSON(steps.failure_details.outputs.result).workflowName }}
            Branch: ${{ fromJSON(steps.failure_details.outputs.result).headBranch }}
            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}

            Only apply safe, mechanical fixes for lint, formatting, or similarly obvious CI issues.
            Do not change behavior, do not rewrite release flows, and do not create sync branches from main.

            Verify with:
            - bun run typecheck
            - bun run lint
          claude_args: |
            --model claude-opus-4-6
            --max-turns 999
            --allowedTools Read,Write,Edit,Bash(*)
          use_commit_signing: false
