name: Release and Preview Branch CI/CD

on:
  push:
    branches:
      - "**"
      - "!main"

permissions:
  contents: write
  packages: write

jobs:
  branch-build-deploy:
    runs-on: ubuntu-latest
    if: github.event.pusher.name != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare branch info and tags
        id: branch_info
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          if [ "$BRANCH_NAME" = "release" ]; then
            BASE_TAG="release"
            VERSIONED_TAG="release-$SHORT_SHA"
          else
            BASE_TAG="$SAFE_BRANCH_NAME"
            VERSIONED_TAG="$SAFE_BRANCH_NAME-$SHORT_SHA"
          fi

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "safe_branch_name=$SAFE_BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "versioned_tag=$VERSIONED_TAG" >> $GITHUB_OUTPUT

      - name: Setup Node.js for formatting
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies, type check, and format code
        run: |
          bun install
          bun run typecheck
          bun run format
          bun run lint

      - name: Commit formatted code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --staged .github/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          if [ "${{ steps.branch_info.outputs.branch_name }}" = "release" ]; then
            echo "Formatting changes detected on release branch; skipping auto-push"
            git diff --cached --stat
            exit 0
          fi

          git commit -m "chore: format code (${{ steps.branch_info.outputs.versioned_tag }})"
          git push origin ${{ steps.branch_info.outputs.branch_name }}

      - name: Prepare image names
        id: image_names
        run: |
          GHCR_IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/claude-code-hub" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.branch_info.outputs.versioned_tag }}
          tags: |
            ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.branch_info.outputs.versioned_tag }}
            ${{ steps.image_names.outputs.ghcr_image }}:${{ steps.branch_info.outputs.base_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.branch_info.outputs.versioned_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
